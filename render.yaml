services:
  - type: web
    name: telegram-openrouter-bot
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL_DEFAULT
        value: openai/gpt-3.5-turbo
      - key: OPENROUTER_MODEL_CODE
        value: anthropic/claude-3-haiku
      - key: OPENROUTER_MODEL_RESEARCH
        value: perplexity/sonar-small-chat
      - key: OPENROUTER_SITE_URL
        value: https://your-site.com
      - key: OPENROUTER_APP_NAME
        value: TelegramOpenRouterBot
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_DEFAULT
        value: mixtral-8x7b-32768
      - key: GROQ_MODEL_CODE
        value: llama3-70b-8192
      - key: LLM_PRIMARY_PROVIDER
        value: openrouter
      - key: LLM_FALLBACK_PROVIDER
        value: groq
      - key: LLM_REQUEST_TIMEOUT
        value: 30
      - key: LLM_MAX_RETRIES
        value: 2
      - key: DATABASE_URL
        fromDatabase:
          name: botdb
          property: connectionString
